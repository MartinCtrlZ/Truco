<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Truco - Contador</title>
  <link rel="stylesheet" href="styles.css?v=1" />
</head>

<body>
  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">
      <div class="brandTitle">YERBA MATE</div>
      <div class="brandName">ARMIÑO</div>
    </div>

    <button id="authBtn" class="iconBtn" aria-label="Acceso / Login" title="Acceso">
      <!-- icono usuario -->
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.42 0-8 2-8 4.5V21h16v-2.5C20 16 16.42 14 12 14z"></path>
      </svg>
    </button>
  </header>

  <!-- SCREEN: NUEVA PARTIDA -->
  <main id="screenStart" class="screen screenStart">
    <h1 class="title">NUEVA<br>PARTIDA</h1>

    <div class="card">
      <label class="label">EQUIPO 1</label>
      <div class="row">
        <input id="team1Input" class="input" value="NOSOTROS" maxlength="18" />
        <button class="miniBtn" id="clearTeam1" title="Borrar">×</button>
      </div>

      <label class="label">EQUIPO 2</label>
      <div class="row">
        <input id="team2Input" class="input" value="ELLOS" maxlength="18" />
        <button class="miniBtn" id="clearTeam2" title="Borrar">×</button>
      </div>

      <label class="label">PARTIDA A</label>
      <div class="row">
        <select id="targetSelect" class="select">
          <option value="10">10 TANTOS</option>
          <option value="20">20 TANTOS</option>
          <option value="30">30 TANTOS</option>
          <option value="40" selected>40 TANTOS</option>
          <option value="50">50 TANTOS</option>
          <option value="60">60 TANTOS</option>
        </select>
      </div>

      <button id="startBtn" class="primaryBtn">Empezar</button>
    </div>
  </main>

  <!-- SCREEN: PARTIDA -->
  <main id="screenGame" class="screen screenGame hidden">
    <div class="gameTop">
      <button id="newBtn" class="ghostBtn">
        <span class="ghostIcon">🂠</span> Nueva
      </button>

      <div class="logoCenter">ARMIÑO</div>

      <button id="rulesBtn" class="ghostBtn">
        <span class="ghostIcon">📜</span> Reglas
      </button>
    </div>

    <!-- Area blanca scrollable -->
    <section class="boardWrap">
      <div class="boardHeader">
        <div class="teamHeader">
          <div class="teamName" id="team1Name">NOSOTROS</div>
          <button class="editBtn" id="editTeam1" title="Editar nombre">✎</button>
        </div>

        <div class="teamHeader right">
          <div class="teamName" id="team2Name">ELLOS</div>
          <button class="editBtn" id="editTeam2" title="Editar nombre">✎</button>
        </div>
      </div>

      <div class="board">
        <div class="col" id="col1">
          <div class="tallyArea" id="tally1"></div>
        </div>

        <div class="dividerV"></div>

        <div class="col" id="col2">
          <div class="tallyArea" id="tally2"></div>
        </div>

        <!-- Línea horizontal dinámica -->
        <div class="dividerH" id="dividerH"></div>
      </div>
    </section>

    <!-- Controles abajo -->
    <footer class="bottomBar">
      <button id="minus1" class="minusBtn" aria-label="Restar punto equipo 1">−</button>
      <div class="spacer"></div>
      <button id="minus2" class="minusBtn" aria-label="Restar punto equipo 2">−</button>
    </footer>
  </main>

  <!-- SCREEN: REGLAS -->
  <main id="screenRules" class="screen screenRules hidden">
    <div class="rulesTop">
      <button id="backFromRules" class="backBtn">← Volver</button>
      <div class="rulesTitle">Reglas</div>
    </div>

    <div class="rulesMenu card">
      <button class="rulesItem" data-section="reglas">REGLAS <span>›</span></button>
      <button class="rulesItem" data-section="senas">SEÑAS <span>›</span></button>
      <button class="rulesItem" data-section="versos">VERSOS <span>›</span></button>
    </div>

    <section id="rulesContent" class="rulesContent card hidden">
      <div class="rulesContentTop">
        <button id="rulesBackToMenu" class="backBtn">← Volver</button>
        <div id="rulesContentTitle" class="rulesContentTitle">Reglas</div>
      </div>

      <div id="rulesList" class="rulesList"></div>
    </section>
  </main>

  <!-- MODAL: AUTH + HISTORIAL -->
  <div id="authModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalSheet">
      <button id="closeAuth" class="closeX">×</button>

      <div class="modalTabs">
        <button class="tabBtn active" data-tab="access">Acceso</button>
        <button class="tabBtn" data-tab="history">Historial</button>
      </div>

      <div id="tab_access" class="tabPanel">
        <h2>Acceso</h2>

        <input id="emailInput" class="input" placeholder="Email" type="email" />
        <input id="passInput" class="input" placeholder="Contraseña" type="password" />
        <div class="hint">Mínimo de caracteres 6</div>

        <div class="row gap">
          <button id="loginBtn" class="primaryBtn">Entrar</button>
          <button id="registerBtn" class="secondaryBtn">Crear cuenta</button>
        </div>

        <button id="logoutBtn" class="ghostWide hidden">Cerrar sesión</button>
        <div id="authStatus" class="status"></div>
      </div>

      <div id="tab_history" class="tabPanel hidden">
        <h2>Historial</h2>
        <div id="historyBox" class="historyBox">
          <div class="muted">Iniciá sesión para ver tu historial.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONFIRMAR GANADOR -->
  <div id="winnerModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalSheet small">
      <h3>Confirmar ganador</h3>
      <p id="winnerText" class="modalText"></p>
      <div class="row gap">
        <button id="winnerNo" class="secondaryBtn">No</button>
        <button id="winnerYes" class="primaryBtn">Sí</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=1" type="module"></script>
</body>
</html>
